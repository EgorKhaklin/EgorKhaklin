<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Egor Khaklin — Proof over trust. You should never have to take the code's word for it.">
  <title>Egor Khaklin — Proof over trust</title>
  <style>
    /* ===== SHARED sweep — identical in hero.svg and divider.svg so they align.
       bright center at local x=0; translateX maps straight onto the 1200 viewBox. */
    @keyframes glassSweep {
      0%   { transform: translateX(-160px); opacity: 0; }
      7%   { opacity: 1; }
      93%  { opacity: 1; }
      100% { transform: translateX(1360px); opacity: 0; }
    }
    .gsweep { animation: glassSweep 13s linear infinite; }

    @keyframes breathe { 0%,100% { opacity:.5; } 50% { opacity:.95; } }
    .pulse { animation: breathe 7s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .gsweep,.pulse { animation:none; }
      .gsweep { opacity:0; }
    }
  </style>
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="100%">
      <stop offset="0%" stop-color="#0c1620"/><stop offset="44%" stop-color="#070d14"/><stop offset="100%" stop-color="#05070a"/>
    </radialGradient>
    <linearGradient id="paneFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2731" stop-opacity=".40"/><stop offset="50%" stop-color="#0a1922" stop-opacity=".26"/><stop offset="100%" stop-color="#06121a" stop-opacity=".46"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".16"/><stop offset="14%" stop-color="#ffffff" stop-opacity=".03"/><stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity="0"/><stop offset="38%" stop-color="#00bcd4" stop-opacity=".10"/>
      <stop offset="50%" stop-color="#cdf6ff" stop-opacity=".9"/><stop offset="52%" stop-color="#ffffff" stop-opacity=".98"/><stop offset="54%" stop-color="#5cc8ff" stop-opacity=".9"/>
      <stop offset="64%" stop-color="#00bcd4" stop-opacity=".10"/><stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/>
    </linearGradient>
    <!-- spectral fringe (trails BEHIND the core) -->
    <linearGradient id="fringe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a98bff" stop-opacity="0"/><stop offset="36%" stop-color="#a98bff" stop-opacity=".30"/>
      <stop offset="58%" stop-color="#5cc8ff" stop-opacity=".42"/><stop offset="74%" stop-color="#7df9ff" stop-opacity=".5"/><stop offset="100%" stop-color="#7df9ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eafbff"/><stop offset="55%" stop-color="#bfeefb"/><stop offset="100%" stop-color="#67c9ef"/>
    </linearGradient>
    <!-- soft beam mask gradient: bright in the middle, fades at the edges -->
    <linearGradient id="beamGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="38%" stop-color="#fff" stop-opacity=".55"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="1"/><stop offset="62%" stop-color="#fff" stop-opacity=".55"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="frostBlur" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="textGlow" x="-30%" y="-60%" width="160%" height="220%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="frostTex" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9 0.9" numOctaves="2" seed="7" result="n"/>
      <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.78  0 0 0 0 0.93  0 0 0 0 1  0 0 0 0.04 0"/>
    </filter>
    <rect id="paneShape" x="40" y="40" width="1120" height="220" rx="22"/>
    <clipPath id="paneClip"><use href="#paneShape"/></clipPath>
    <!-- soft moving beam that lights each letter as it passes -->
    <mask id="beamMask"><rect class="gsweep" x="-95" y="0" width="190" height="300" fill="url(#beamGrad)"/></mask>
    <g id="wordmark"><text x="600" y="150" text-anchor="middle" font-family="'Helvetica Neue', Arial, system-ui, sans-serif" font-size="86" font-weight="700" letter-spacing="14">KHAKLIN</text></g>
  </defs>

  <rect width="1200" height="300" fill="#05070a"/>
  <rect width="1200" height="300" fill="url(#bg)"/>

  <g clip-path="url(#paneClip)">
    <g opacity=".08" stroke="#5cc8ff" stroke-width="1">
      <path d="M40 100 H1160 M40 150 H1160 M40 200 H1160"/>
      <path d="M200 40 V260 M400 40 V260 M600 40 V260 M800 40 V260 M1000 40 V260"/>
    </g>
    <use href="#paneShape" fill="url(#paneFill)"/>

    <!-- light frost texture -->
    <use href="#paneShape" filter="url(#frostTex)" opacity=".5"/>

    <!-- wordmark base: readable, slightly soft (behind the glass) -->
    <use href="#wordmark" fill="url(#wm)" opacity=".5" filter="url(#frostBlur)"/>

    <!-- per-letter light-up: bright wordmark revealed only under the moving soft beam -->
    <g mask="url(#beamMask)"><use href="#wordmark" fill="#eafdff" filter="url(#textGlow)"/></g>

    <!-- sweep: FRINGE behind, halo, then the crisp core on top -->
    <g class="gsweep">
      <rect x="-150" y="40" width="150" height="220" fill="url(#fringe)" transform="skewX(-12)" opacity=".6"/>
      <rect x="-90"  y="40" width="180" height="220" fill="url(#shaft)" filter="url(#soft)" opacity=".6"/>
      <rect x="-7"   y="40" width="14"  height="220" fill="url(#shaft)"/>
    </g>

    <use href="#paneShape" fill="url(#sheen)"/>
  </g>

  <use href="#paneShape" fill="none" stroke="#5cc8ff" stroke-opacity=".34" stroke-width="1.2"/>
  <use href="#paneShape" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="3"/>

  <circle class="pulse" cx="74" cy="74" r="3.4" fill="#00bcd4"/>
  <text x="90" y="79" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" letter-spacing="2" fill="#9fb4bd">@EgorKhaklin</text>
  <g transform="translate(1042,62)">
    <rect x="0" y="0" width="118" height="26" rx="13" fill="#00bcd4" fill-opacity=".10" stroke="#00bcd4" stroke-opacity=".34"/>
    <circle class="pulse" cx="17" cy="13" r="4" fill="#5cc8ff"/>
    <text x="32" y="17" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="12" letter-spacing="1" fill="#bfeefb">VERIFIED ✓</text>
  </g>
  <text x="600" y="206" text-anchor="middle" font-family="'Helvetica Neue', Arial, system-ui, sans-serif" font-size="14.5" font-weight="500" letter-spacing="5.5" fill="#9fb4bd">PROOF OVER TRUST</text>
  <text x="600" y="232" text-anchor="middle" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="11.5" letter-spacing="1.5" fill="#5f7682">you should never have to take the code&apos;s word for it</text>
</svg>