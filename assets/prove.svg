<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 120" width="760" height="120" role="img" aria-label="Glass terminal: glass prove --emit p.txt hello.glass -> PENTECOST: ACCEPT">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0a0e13"/><stop offset="1" stop-color="#05070a"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity=".07"/><stop offset=".5" stop-color="#00bcd4" stop-opacity=".05"/><stop offset="1" stop-color="#ffffff" stop-opacity=".025"/></linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5cc8ff" stop-opacity=".55"/><stop offset=".5" stop-color="#00bcd4" stop-opacity=".18"/><stop offset="1" stop-color="#5cc8ff" stop-opacity=".4"/></linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#5cc8ff" stop-opacity="0"/><stop offset=".42" stop-color="#5cc8ff" stop-opacity="0"/><stop offset=".5" stop-color="#5cc8ff" stop-opacity=".16"/><stop offset=".58" stop-color="#5cc8ff" stop-opacity="0"/><stop offset="1" stop-color="#5cc8ff" stop-opacity="0"/></linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".5"><stop offset="0" stop-color="#00bcd4" stop-opacity=".35"/><stop offset="1" stop-color="#00bcd4" stop-opacity="0"/></radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="frost" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="7"/></filter>
    <clipPath id="panelClip"><rect x="20" y="16" width="720" height="88" rx="14"/></clipPath>
    <clipPath id="typeClip"><rect class="clipBox" x="44" y="52" width="410.4" height="22"/></clipPath>
    <style>
    .mono{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:17px;letter-spacing:.5px;}

    /* one shared 9s loop drives every track.
       Reveal = SLIDE the clip window via transform:translateX (NOT animate rect width):
       transform is the property WebKit/iOS animates reliably in image-mode SVG; animating
       SVG geometry (rect width) is the fragile path that breaks the reveal on Safari/iPhone. */
    .clipBox{ animation: typeReveal 9s infinite; }
    @keyframes typeReveal{
      0%   { transform: translateX(-410.4px); animation-timing-function: steps(38, end); }
      7% { transform: translateX(-410.4px); animation-timing-function: steps(38, end); }
      40%  { transform: translateX(0); }
      92%  { transform: translateX(0); }
      93%   { transform: translateX(-410.4px); }
      100% { transform: translateX(-410.4px); }
    }

    .caret{ animation: caretGate 9s infinite; }
    @keyframes caretGate{
      0%,49% { opacity:1; }
      50%,100% { opacity:0; }
    }
    .caretBlink{ animation: blink 1.05s steps(1) infinite; }
    @keyframes blink{ 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .caretRide{ animation: caretRide 9s infinite; }
    @keyframes caretRide{
      0%   { transform: translateX(0); animation-timing-function: steps(38, end); }
      7% { transform: translateX(0); animation-timing-function: steps(38, end); }
      40%  { transform: translateX(410.4px); }
      92%  { transform: translateX(410.4px); }
      93%   { transform: translateX(0); }
      100% { transform: translateX(0); }
    }

    .result{ opacity:0; animation: showRes 9s infinite; }
    @keyframes showRes{
      0%,49%{opacity:0} 52%{opacity:1}
      92%{opacity:1} 95%,100%{opacity:0}
    }
    .accGlow{ opacity:0; animation: accGlow 9s infinite; }
    @keyframes accGlow{
      0%,50%{opacity:0} 54%{opacity:.85}
      64%{opacity:.4} 72%{opacity:.8} 92%{opacity:.5}
      93%,100%{opacity:0}
    }
    .lightsweep{ animation: sweepmove 11s ease-in-out infinite; }
    @keyframes sweepmove{ 0%{transform:translateX(-360px)} 55%,100%{transform:translateX(760px)} }

    /* honour reduce-motion: show the finished, legible terminal, no motion */
    @media (prefers-reduced-motion: reduce){
      .clipBox{ transform:none !important; animation:none !important; }
      .caret{ opacity:0 !important; animation:none !important; }
      .result,.accGlow{ opacity:1 !important; animation:none !important; }
      .lightsweep{ animation:none !important; }
    }
</style>
  </defs>

  <rect x="0" y="0" width="760" height="120" fill="url(#bg)"/>
  <rect x="0" y="40" width="760" height="120" fill="url(#glow)" opacity=".5"/>
  <rect x="20" y="16" width="720" height="88" rx="14" fill="url(#panel)"/>
  <rect x="20" y="16" width="720" height="88" rx="14" fill="none" stroke="url(#rim)" stroke-width="1.1"/>
  <rect x="22" y="18" width="716" height="20" rx="12" fill="#ffffff" opacity=".04"/>
  <g clip-path="url(#panelClip)"><rect class="lightsweep" x="0" y="16" width="300" height="88" fill="url(#sweep)"/></g>
  <circle cx="42" cy="33" r="4" fill="#ff5f57" opacity=".85"/><circle cx="58" cy="33" r="4" fill="#febc2e" opacity=".85"/><circle cx="74" cy="33" r="4" fill="#28c840" opacity=".85"/>
  <text x="694" y="37" class="mono" font-size="10" letter-spacing="1.5" fill="#9fb4bd" opacity=".6">glass</text>

  <!-- PROMPT revealed by the growing clip -->
  <g clip-path="url(#typeClip)"><text x="44" y="68" class="mono" xml:space="preserve"><tspan fill="#5cc8ff" font-weight="600">$</tspan><tspan fill="#e8f6fb"> </tspan><tspan fill="#e8f6fb">glass</tspan><tspan fill="#e8f6fb"> </tspan><tspan fill="#5cc8ff">prove</tspan><tspan fill="#e8f6fb"> </tspan><tspan fill="#9fb4bd">--emit</tspan><tspan fill="#e8f6fb"> </tspan><tspan fill="#e8f6fb">p.txt</tspan><tspan fill="#e8f6fb"> </tspan><tspan fill="#e8f6fb">hello</tspan><tspan fill="#5cc8ff">.glass</tspan></text></g>

  <!-- caret rides the typing edge, hides when the result lands -->
  <g class="caret"><g class="caretRide" transform="translate(44,0)"><rect class="caretBlink" x="0" y="55" width="8" height="17" rx="1.5" fill="#5cc8ff"/></g></g>

  <!-- RESULT -->
  <g transform="translate(44,94)">
    <ellipse class="accGlow" cx="120" cy="-5" rx="120" ry="16" fill="url(#glow)" filter="url(#frost)"/>
    <g class="result">
      <text x="0" y="0" class="mono" fill="#9fb4bd" letter-spacing="1">PENTECOST:</text>
      <text x="118" y="0" class="mono" font-weight="700" letter-spacing="1.2" fill="#00e6ff" filter="url(#soft)" opacity=".55">ACCEPT</text>
      <text x="118" y="0" class="mono" font-weight="700" letter-spacing="1.2" fill="#5cc8ff">ACCEPT</text>
      <text x="192" y="0" class="mono" font-weight="700" fill="#00e6ff">&#10003;</text>
    </g>
  </g>
</svg>