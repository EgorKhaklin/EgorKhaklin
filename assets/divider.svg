<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 24" width="1200" height="24" role="img" aria-label="Divider with a cyan light sweep synced to the hero">
  <style>
    /* ===== shared beam timeline — hero beam, reveal clip, and divider glint all ride this ===== */
    @keyframes beamSweep {
      0%   { transform: translateX(-160px); opacity: 0; }
      3%   { opacity: 1; }
      42%  { opacity: 1; }
      45%  { transform: translateX(1360px); opacity: 0; }
      100% { transform: translateX(1360px); opacity: 0; }
    }
    .gsweep { animation: beamSweep 20s linear infinite; }

    @media (prefers-reduced-motion: reduce) { .gsweep { animation:none; opacity:0; } }
  </style>
  <defs>
    <filter id="dGlow" x="-20%" y="-400%" width="140%" height="900%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="dRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00bcd4" stop-opacity="0"/><stop offset=".18" stop-color="#00bcd4" stop-opacity=".30"/>
      <stop offset=".5" stop-color="#5cc8ff" stop-opacity=".55"/><stop offset=".82" stop-color="#00bcd4" stop-opacity=".30"/><stop offset="1" stop-color="#00bcd4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dGlint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00bcd4" stop-opacity="0"/><stop offset=".42" stop-color="#5cc8ff" stop-opacity=".85"/>
      <stop offset=".5" stop-color="#eafaff" stop-opacity="1"/><stop offset=".58" stop-color="#5cc8ff" stop-opacity=".85"/><stop offset="1" stop-color="#00bcd4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dHalo" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#aef0ff" stop-opacity=".9"/><stop offset=".4" stop-color="#00bcd4" stop-opacity=".45"/><stop offset="1" stop-color="#00bcd4" stop-opacity="0"/></radialGradient>
  </defs>

  <rect x="0" y="11.4" width="1200" height="1.2" fill="url(#dRule)"/>
  <!-- glint rides the SAME beamSweep as the hero beam; bright center offset -55 to meet
       the hero beam's BOTTOM edge (the skewed beam leans ~55px left at the pane bottom) -->
  <g class="gsweep" opacity="0" filter="url(#dGlow)">
    <ellipse cx="-55" cy="12" rx="110" ry="9" fill="url(#dHalo)"/>
    <rect x="-155" y="10.6" width="200" height="2.8" rx="1.4" fill="url(#dGlint)"/>
    <circle cx="-55" cy="12" r="1.9" fill="#f2fdff"/>
  </g>
</svg>